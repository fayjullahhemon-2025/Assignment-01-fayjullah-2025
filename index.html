<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevConf</title>
    <link rel="stylesheet" href="./style.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Arimo:ital,wght@0,400..700;1,400..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap');
    </style>
</head>

<body>
    <header>
        <div class="logo">
            <img src="./assets/logo.png" alt="">
        </div>
        <nav>
            <ul>
                <li><a href="#" class="txt-16">Speakers</a></li>
                <li><a href="#" class="txt-16">Schedule</a></li>
                <li><a href="#" class="txt-16">Tracks</a></li>
                <li><a href="#" class="txt-16">Venue</a></li>
                <li><a href="#" class="txt-16">Blogs</a></li>
            </ul>
        </nav>
        <button class="btn">Register Now</button>
    </header>
    <section class="hero-section">
        <h1 class="txt-80">Code. <em class="txt-80"> Connect. </em>Create</h1>
        <p class="txt-22">Join 4,000+ engineers, founders, and builders at the premier developer <br> conference of 2026. Three days of cutting-edge talks, hands-on workshops, <br> and meaningful connections.</p>
        <button class="btn txt-22">Register Now</button>
    </section>
    <main>
        <div class="speaker-list-section">
            <h1 class="txt-48">
                Meet the Speakers
            </h1>
            <div class="grid-speaker-list">
                <div class="speaker">
                    <div class="grid-img">
                        <img src="./assets/gary.png" alt="" srcset="">
                    </div>
                </div>
            </div>
        </div>
